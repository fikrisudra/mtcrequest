<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTC Request Form</title>
    <style>
        /* Base & Reset Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #1e293b;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container Mobile-First */
        .container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: -0.025em;
        }

        /* Form Layouts */
        .form-group {
            margin-bottom: 18px;
        }

        .form-row {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            color: #475569;
        }

        /* Modern Input Styling */
        input, select, textarea {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            background-color: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 10px;
            color: #1e293b;
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            background-color: #ffffff;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        textarea {
            resize: none;
        }

        /* Modern Green Button */
        button {
            width: 100%;
            padding: 14px;
            background-color: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }

        button:hover {
            background-color: #059669;
        }

        button:disabled {
            background-color: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Seamless Custom Toast Notification */
        .toast {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #0f172a;
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.15);
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            white-space: nowrap;
        }

        .toast.show {
            top: 24px;
        }

        /* Responsive Grid untuk Desktop Mode */
        @media (min-width: 480px) {
            .form-row {
                flex-direction: row;
                gap: 16px;
            }
            .form-row .form-group {
                flex: 1;
            }
        }
    </style>
</head>
<body>

<div id="customToast" class="toast">Permintaan Perbaikan Terkirim!</div>

<div class="container">
    <h2>Form Permintaan Perbaikan</h2>
    <form id="repairForm">
        
        <div class="form-row">
            <div class="form-group">
                <label for="tanggal">Tanggal</label>
                <input type="date" id="tanggal" required>
            </div>
            <div class="form-group">
                <label for="nama">Nama Pelapor</label>
                <input type="text" id="nama" required placeholder="Nama lengkap">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="unit">Unit Kerja</label>
                <select id="unit" required>
                    <option value="">Pilih Unit</option>
                    <option value="Mechanic">Mechanic</option>
                    <option value="Electric">Electric</option>
                    <option value="Automotive">Automotive</option>
                </select>
            </div>
            <div class="form-group">
                <label for="kategori">Kategori</label>
                <select id="kategori" required>
                    <option value="">Pilih Kategori</option>
                    <option value="N1">N1</option>
                    <option value="N2">N2</option>
                    <option value="N3">N3</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="dtAwal">Downtime Awal</label>
                <input type="time" id="dtAwal" required>
            </div>
            <div class="form-group">
                <label for="dtAkhir">Downtime Akhir</label>
                <input type="time" id="dtAkhir" required>
            </div>
        </div>

        <div class="form-group">
            <label for="deskripsi">Deskripsi Masalah</label>
            <textarea id="deskripsi" rows="4" required placeholder="Jelaskan detail kerusakan..."></textarea>
        </div>

        <button type="submit" id="btnSubmit">Kirim Permintaan</button>
    </form>
</div>

<script>
    // GANTI DENGAN URL WEB APP RE-DEPLOYMENT TERBARU ANDA
    const API_URL = "https://script.google.com/macros/s/AKfycby0SGiJIe7sZ7PuT2sYAFfG8vy5WQYQKHGkq5gXTB6iaOFlVuGoce7bS5VJm77_mmdG/exec";

    // Set tanggal default ke hari ini
    document.getElementById('tanggal').valueAsDate = new Date();

    document.getElementById("repairForm").addEventListener("submit", function(e) {
        e.preventDefault();
        
        const btnSubmit = document.getElementById("btnSubmit");
        const toast = document.getElementById("customToast");
        
        btnSubmit.disabled = true;
        btnSubmit.innerText = "Mengirim...";
        
        const dataForm = {
            tanggal: document.getElementById("tanggal").value,
            nama: document.getElementById("nama").value,
            unit: document.getElementById("unit").value,
            kategori: document.getElementById("kategori").value,
            dtAwal: document.getElementById("dtAwal").value,
            dtAkhir: document.getElementById("dtAkhir").value,
            deskripsi: document.getElementById("deskripsi").value
        };

        // Kirim data ke Google Sheets
        fetch(API_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify(dataForm)
        });

        // Fire and forget logic dengan Custom Toast Animasi
        setTimeout(function() {
            toast.classList.add("show");
            
            document.getElementById("repairForm").reset();
            document.getElementById('tanggal').valueAsDate = new Date();
            btnSubmit.disabled = false;
            btnSubmit.innerText = "Kirim Permintaan";

            setTimeout(function() {
                toast.classList.remove("show");
            }, 3000);
            
        }, 800);
    });
</script>

</body>
</html>
